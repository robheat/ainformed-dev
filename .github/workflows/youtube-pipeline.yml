name: YouTube Shorts Pipeline

on:
  schedule:
    # Every Monday and Thursday at 3pm UTC (schedule posts for peak engagement)
    - cron: "0 15 * * 1,4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate everything but skip upload)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      scripts_per_run:
        description: "Number of new Shorts to generate"
        required: false
        default: "2"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  youtube-shorts:
    # Self-hosted runner required for Coqui XTTS v2 (needs local GPU + PyTorch)
    # Setup instructions: https://docs.github.com/en/actions/hosting-your-own-runners
    runs-on: self-hosted
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YouTube pipeline dependencies
        working-directory: pipeline
        run: pip install -r requirements-youtube.txt

      - name: Generate Shorts scripts (Venice AI)
        working-directory: pipeline
        env:
          VENICE_AI_API_KEY: ${{ secrets.VENICE_AI_API_KEY }}
          YT_SCRIPTS_PER_RUN: ${{ github.event.inputs.scripts_per_run || '2' }}
        run: python generate_shorts_script.py

      - name: Generate TTS audio (Coqui XTTS v2)
        working-directory: pipeline
        env:
          XTTS_SPEAKER: ${{ secrets.XTTS_SPEAKER || 'Claribel Dervla' }}
          XTTS_LANG: "en"
        run: python generate_tts.py

      - name: Render Short videos (MoviePy)
        working-directory: pipeline
        run: python render_short.py

      - name: Upload to YouTube
        working-directory: pipeline
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YT_DRY_RUN: ${{ (github.event.inputs.dry_run == 'false') && '0' || '1' }}
        run: python upload_youtube.py

      - name: Commit YouTube queue state
        if: always()
        run: |
          git config user.name "AInformed Bot"
          git config user.email "bot@ainformed.dev"
          git pull --rebase origin master
          git add content/.youtube-queue.json
          git diff --cached --quiet || git commit -m "📹 YouTube queue update $(date -u +%Y-%m-%d)"
          git push origin master
